# =============================================================================
# Development Container — Docker Compose (Base Template)
# =============================================================================
# Usage (standalone):
#   cd .devcontainer
#   bash init-env.sh                # generates .env (UID/GID + COMPOSE_PROJECT_NAME)
#   docker compose build
#   docker compose up -d
#   docker compose exec dev zsh
#
# Usage (devcontainer):
#   Open in VS Code -> "Reopen in Container"
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Main development container
  # ---------------------------------------------------------------------------
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_VERSION: ${CUDA_VERSION:-12.8.0}
        HOST_UID: ${HOST_UID:?run "bash .devcontainer/init-env.sh" first to generate .devcontainer/.env}
        HOST_GID: ${HOST_GID:?run "bash .devcontainer/init-env.sh" first to generate .devcontainer/.env}
        HOST_USER: ${USER:-developer}
    image: ${COMPOSE_PROJECT_NAME}:latest

    environment:
      - HOST_USER=${USER:-developer}
      - DISPLAY=${DISPLAY:-:1}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    # Per-machine Doppler token (single file shared by all projects on this
    # host). Loaded only by Compose at container start, not into the host shell.
    # File contents: DOPPLER_TOKEN=dp.st.<config>.<token>
    # Skipped silently when the file does not exist.
    env_file:
      - path: ${HOME}/.config/doppler.env
        required: false

    volumes:
      # Project workspace (host project dir -> container /workspace)
      - ..:/workspace:cached

      # Host git/ssh config (read-only). API tokens come from Doppler instead.
      - ${HOME}/.ssh:/home/${USER:-developer}/.ssh:ro
      - ${HOME}/.gitconfig:/home/${USER:-developer}/.gitconfig:ro

      # Claude Code: share user-level config; auth stays per-container;
      # session history persists across rebuild via the 4 mounts below.
      - ${HOME}/.claude/CLAUDE.md:/home/${USER:-developer}/.claude/CLAUDE.md
      - ${HOME}/.claude/skills:/home/${USER:-developer}/.claude/skills
      - ${HOME}/.claude/agents:/home/${USER:-developer}/.claude/agents
      - ${HOME}/.claude/plugins:/home/${USER:-developer}/.claude/plugins
      - ${HOME}/.claude/hooks:/home/${USER:-developer}/.claude/hooks
      - ${HOME}/.claude/settings.json:/home/${USER:-developer}/.claude/settings.json
      - ${HOME}/.claude/keybindings.json:/home/${USER:-developer}/.claude/keybindings.json
      - ${HOME}/.claude/rules:/home/${USER:-developer}/.claude/rules

      # Claude Code session history (per compose project, survives rebuild).
      # Host layout: ~/.claude-stacks/<COMPOSE_PROJECT_NAME>/{projects,sessions,todos,shell-snapshots}
      - ${HOME}/.claude-stacks/${COMPOSE_PROJECT_NAME}/projects:/home/${USER:-developer}/.claude/projects
      - ${HOME}/.claude-stacks/${COMPOSE_PROJECT_NAME}/sessions:/home/${USER:-developer}/.claude/sessions
      - ${HOME}/.claude-stacks/${COMPOSE_PROJECT_NAME}/todos:/home/${USER:-developer}/.claude/todos
      - ${HOME}/.claude-stacks/${COMPOSE_PROJECT_NAME}/shell-snapshots:/home/${USER:-developer}/.claude/shell-snapshots

      # X11 / GUI forwarding
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # Pip cache (persist across rebuilds)
      - pip-cache:/home/${USER:-developer}/.cache/pip

    # Shared memory for PyTorch DataLoader workers, NCCL, etc.
    ipc: host

    # GPU support (NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    stdin_open: true
    tty: true
    working_dir: /workspace

    command: ["sleep", "infinity"]

volumes:
  pip-cache:
