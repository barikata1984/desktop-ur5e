[workspace]
name = "desktop-ur5e"
version = "0.1.0"
description = "Unified UR5e MuJoCo simulation environment"
channels = ["conda-forge"]
platforms = ["linux-64"]

exclude-newer = "7d"

[tasks]
build = "docker compose -f .devcontainer/docker-compose.yaml build"
up = "docker compose -f .devcontainer/docker-compose.yaml up -d"
shell = "docker compose -f .devcontainer/docker-compose.yaml exec dev zsh"
down = "docker compose -f .devcontainer/docker-compose.yaml down"
logs = "docker compose -f .devcontainer/docker-compose.yaml logs -f"

# Simulation tasks (run inside the container)
push = "python scripts/run_push.py"
identify = "python scripts/run_identification.py"
keyframe = "python scripts/make_keyframe.py"
analytical = "python scripts/analytical_push.py"
setup = "bash scripts/setup_assets.sh"

[dependencies]
python = "3.12.*"

# Development / debugging
debugpy = "*"
ipdb = "*"
rich = "*"

# Code quality
ruff = "*"

# Testing
pytest = ">=7.0"
pytest-xdist = "*"

# Simulation
mujoco = ">=3.8.1,<4"
scipy = ">=1.17,<2"
matplotlib = ">=3.10,<4"
pillow = ">=12,<13"
ffmpeg = ">=8,<9"

[pypi-dependencies]
tyro = "*"
pyyaml = "*"
imageio = { version = "*", extras = ["ffmpeg"] }
ur5e-sim = { path = ".", editable = true }
